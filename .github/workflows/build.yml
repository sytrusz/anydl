name: Build Portable anydl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  SPOTDL_VERSION: "4.5.0" 

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: anydl.exe
            bundle_name: anydl-windows
            sep: ";"
            zip_cmd: "powershell Compress-Archive -Path dist/anydl/* -DestinationPath anydl-windows.zip"
            zip_file: "anydl-windows.zip"
          - os: ubuntu-20.04
            artifact_name: anydl
            bundle_name: anydl-linux
            sep: ":"
            zip_cmd: "zip -r anydl-linux.zip dist/anydl/*"
            zip_file: "anydl-linux.zip"
          - os: macos-latest
            artifact_name: anydl
            bundle_name: anydl-macos
            sep: ":"
            zip_cmd: "zip -r anydl-macos.zip dist/anydl/*"
            zip_file: "anydl-macos.zip"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Setup Binaries (Linux)
        if: matrix.os == 'ubuntu-20.04'
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp
          curl -L "https://github.com/spotDL/spotify-downloader/releases/download/v${{ env.SPOTDL_VERSION }}/spotdl-${{ env.SPOTDL_VERSION }}-linux" -o bin/spotdl
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg bin/
          chmod +x bin/*

      - name: Setup Binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -o bin/yt-dlp.exe
          curl -L "https://github.com/spotDL/spotify-downloader/releases/download/v${{ env.SPOTDL_VERSION }}/spotdl-${{ env.SPOTDL_VERSION }}-win.exe" -o bin/spotdl.exe
          curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -o ffmpeg.zip
          unzip ffmpeg.zip
          cp ffmpeg-*-essentials_build/bin/ffmpeg.exe bin/

      - name: Setup Binaries (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o bin/yt-dlp
          curl -L "https://github.com/spotDL/spotify-downloader/releases/download/v${{ env.SPOTDL_VERSION }}/spotdl-${{ env.SPOTDL_VERSION }}-macos" -o bin/spotdl
          curl -L https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip -o ffmpeg.zip
          unzip ffmpeg.zip -d bin/
          chmod +x bin/*

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Use --onedir instead of --onefile
          pyinstaller --noconsole --onedir --add-data "bin${{ matrix.sep }}bin" --name anydl main.py

      - name: Compress into ZIP
        shell: bash
        run: |
          ${{ matrix.zip_cmd }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.zip_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
