name: Build Portable anydl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: anydl.exe
            bundle_name: anydl-windows.exe
            sep: ";"
          - os: ubuntu-latest
            artifact_name: anydl
            bundle_name: anydl-linux
            sep: ":"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Setup Binaries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p bin
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp
          
          # Attempt direct download, fallback to API search
          curl -L https://github.com/spotDL/spotify-downloader/releases/latest/download/spotdl-linux -o bin/spotdl || \
          curl -L $(curl -s https://api.github.com/repos/spotDL/spotify-downloader/releases/latest | grep "browser_download_url" | grep "linux" | head -n 1 | cut -d '"' -f 4) -o bin/spotdl
          
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          cp ffmpeg-*-amd64-static/ffmpeg bin/
          chmod +x bin/*
          ls -l bin/

      - name: Setup Binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"
          
          # Simplified spotdl download
          try {
            $api_url = "https://api.github.com/repos/spotDL/spotify-downloader/releases/latest"
            $release = Invoke-RestMethod -Uri $api_url
            $asset = $release.assets | Where-Object { $_.name -like "*win.exe" } | Select-Object -First 1
            $download_url = $asset.browser_download_url
            Write-Host "Downloading spotdl from: $download_url"
            Invoke-WebRequest -Uri $download_url -OutFile "bin/spotdl.exe"
          } catch {
            Write-Host "API lookup failed, trying direct fallback link"
            Invoke-WebRequest -Uri "https://github.com/spotDL/spotify-downloader/releases/latest/download/spotdl-win.exe" -OutFile "bin/spotdl.exe"
          }
          
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Copy-Item -Destination "bin/ffmpeg.exe"
          ls bin/

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconsole --onefile --add-data "bin${{ matrix.sep }}bin" --name anydl main.py

      - name: Rename & Prepare Artifact
        shell: bash
        run: |
          mv dist/${{ matrix.artifact_name }} dist/${{ matrix.bundle_name }}

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.bundle_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
